<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "World Cup Odds Tracker" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('dashboard.index') }}">World Cup Odds</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="{{ url_for('events.list_events') }}">Events</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('odds.compare') }}">Odds</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('movement.movement') }}">Movement</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('value.calculator') }}">Value</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('watchlist.list_items') }}">Watchlist</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('static_data.index') }}">World Cup Data</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('settings.settings') }}">Settings</a></li>
      </ul>
      <form method="post" action="{{ url_for('dashboard.refresh') }}">
        <button class="btn btn-outline-light btn-sm" type="submit">Refresh odds</button>
      </form>
    </div>
  </div>
</nav>
<main class="container-fluid py-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
